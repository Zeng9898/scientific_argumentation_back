services:
  postgres:
    image: postgres:16
    container_name: scientific_argumentation_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sa
      POSTGRES_USER: sa_user
      POSTGRES_PASSWORD: sa_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: scientific_argumentation_pgadmin
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123456
    ports:
      - "5050:80"

volumes:
  postgres_data:
